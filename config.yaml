retry:
  max_attempts: 3
  retry_delay_seconds: 0.0

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: valravn-evaluation

# =============================================================================
# LLM MODEL CONFIGURATION
# Format: provider:model_name
# Supported providers: anthropic, openai, ollama, openrouter
# =============================================================================
models:
  # Investigation planning module
  # Used to generate investigation steps from prompt
  plan: anthropic:claude-3-5-sonnet-20241022

  # Trajectory reflector module (RCL training)
  # Used to diagnose why trajectories fail
  reflector: anthropic:claude-3-5-sonnet-20241022

  # Playbook mutator module (RCL training)
  # Used to generate playbook mutations
  mutator: anthropic:claude-3-5-sonnet-20241022

  # Anomaly detection module
  # Used to detect forensic anomalies in tool output
  anomaly: anthropic:claude-3-5-sonnet-20241022

  # Conclusions synthesis module
  # Used to synthesize findings from investigation
  conclusions: anthropic:claude-3-5-sonnet-20241022

  # Self-assessment module
  # Used to assess investigation progress
  self_assess: anthropic:claude-3-5-sonnet-20241022

  # Tool runner correction module
  # Used to correct failed tool commands
  tool_runner: anthropic:claude-3-5-sonnet-20241022

  # Alternative configurations (uncomment to use):
  #
  # # OpenAI GPT-4o for faster/cheaper tasks
  # tool_runner: openai:gpt-4o
  #
  # # Local Llama model via Ollama (no API costs!)
  # plan: ollama:llama3.2
  #
  # # Claude via OpenRouter
  # reflector: openrouter:anthropic/claude-3-opus-20240229
  #
  # # Mix providers per module
  # plan: openai:gpt-4o
  # reflector: anthropic:claude-3-5-sonnet-20241022
  # mutator: anthropic:claude-3-5-sonnet-20241022
