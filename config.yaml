retry:
  max_attempts: 3
  retry_delay_seconds: 0.0

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment_name: valravn-evaluation

# =============================================================================
# LLM MODEL CONFIGURATION
# Format: provider:model_name
# Supported providers: anthropic, openai, ollama, openrouter
# =============================================================================
models:
  # Investigation planning module
  # Used to generate investigation steps from prompt
  plan: anthropic:claude-sonnet-4-6

  # Trajectory reflector module (RCL training)
  # Used to diagnose why trajectories fail
  reflector: anthropic:claude-sonnet-4-6

  # Playbook mutator module (RCL training)
  # Used to generate playbook mutations
  mutator: anthropic:claude-sonnet-4-6

  # Anomaly detection module
  # Used to detect forensic anomalies in tool output
  anomaly: anthropic:claude-sonnet-4-6

  # Conclusions synthesis module
  # Used to synthesize findings from investigation
  conclusions: anthropic:claude-sonnet-4-6

  # Self-assessment module
  # Used to assess investigation progress
  self_assess: anthropic:claude-sonnet-4-6

  # Tool runner correction module
  # Used to correct failed tool commands
  tool_runner: anthropic:claude-sonnet-4-6

  # Alternative configurations (uncomment to use):
  #
  # # OpenAI GPT-4o for faster/cheaper tasks
  # tool_runner: openai:gpt-4o
  #
  # # Local Llama model via Ollama (no API costs!)
  # plan: ollama:llama3.2
  #
  # # Claude via OpenRouter
  # reflector: openrouter:anthropic/claude-3-opus-20240229
  #
  # # Mix providers per module
  # plan: openai:gpt-4o
  # reflector: anthropic:claude-sonnet-4-6
  # mutator: anthropic:claude-sonnet-4-6

# =============================================================================
# CHECKPOINT CLEANUP POLICY (Q6)
# SQLite checkpoint database grows with each investigation.
# Configure automatic cleanup to prevent unbounded growth.
# =============================================================================
checkpoint_cleanup:
  # Delete checkpoints older than this many days (default: 7)
  retention_days: 7
  
  # Keep at most this many checkpoints per investigation thread (default: 1000)
  max_checkpoints_per_thread: 100
  
  # Never delete below this many checkpoints per thread (default: 2)
  # This ensures you can always resume even after aggressive cleanup
  min_checkpoints_per_thread: 2
  
  # Automatically run cleanup after each investigation completes
  auto_cleanup: true
  
  # Vacuum database after cleanup to reclaim disk space
  auto_vacuum: false  # Set to true if disk space is a concern (slower cleanup)
